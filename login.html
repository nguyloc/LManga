<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="header-left">
            <a href="index.html">
                <img src="IMG/logo.png" alt="Logo Web" class="logo">
            </a>
            <input type="text" placeholder="Nhập tên truyện mà bạn muốn tìm kiếm" class="search-bar">
        </div>
        <nav id="header-right">
            <ul>
                <li><a href="login.html">Đăng Nhập</a></li>
                <li><a href="register.html">Đăng Ký</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Đăng Nhập</h2>
            <form action="#" method="POST">
                <label for="username">Tên đăng nhập:</label>
                <input type="text" id="username" name="username" required>
                
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Đăng Nhập</button>
            </form>
            <p>Chưa có tài khoản? <a href="register.html">Đăng Ký</a></p>
        </div>
    </main>

    <footer>
        <p>Bản quyền © 2024 - Web Đọc Truyện Tranh</p>
    </footer>
</body>
</html>
